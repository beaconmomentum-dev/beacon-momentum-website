    <!-- Schema.org Structured Data — FAQPage -->
    <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What exactly is Beacon Momentum?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Beacon Momentum is an execution engine and private community for founders, operators, and independent creators. We focus on building sovereign systems using AI and modern tools to reclaim your time and build income streams without relying on paid ads or platforms you don't control."
        }
      },
      {
        "@type": "Question",
        "name": "How much does Beacon Momentum cost?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The core Signal Membership is $297 per year. Full Membership, which includes all five pathways and monthly live Q&A with faculty, is $597 per year. The Quartermaster Circle inner-circle tier is $1,497 per year."
        }
      },
      {
        "@type": "Question",
        "name": "Is Beacon Momentum another mastermind or online course?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Beacon is an execution engine. We test methods in Beacon Labs, prove they work, and then hand you the exact workflows and systems to deploy in your own life or business. Masterminds are often just networking events and courses are often just videos you never finish."
        }
      },
      {
        "@type": "Question",
        "name": "Does Beacon Momentum offer personal coaching or 1-on-1 time?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. Beacon Momentum is built on a team approach and peer learning. You get access to the systems, the community, monthly live Q&A with faculty, and the frameworks. We do not sell personal coaching or 1-on-1 time."
        }
      },
      {
        "@type": "Question",
        "name": "Does Beacon Momentum offer a free trial?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We do not offer free trials. We focus on transformation over transactions. You can read the public Watch Brief or use the free Signal Check tool at Beacon Labs to evaluate our approach before joining."
        }
      },
      {
        "@type": "Question",
        "name": "What is the Beacon Pathfinder Assessment?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The Pathfinder Assessment is a diagnostic tool that identifies which of Beacon's five pathways — Life, Work, Venture, Systems, or Trading — is the highest-leverage starting point for where you are right now. It takes about 8 minutes and gives you a specific, prioritized action plan."
        }
      },
      {
        "@type": "Question",
        "name": "How is Beacon Labs different from Beacon Momentum?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Beacon Labs is the research and proof engine. It runs experiments, tests tools, and publishes what works including what failed and why. Beacon Momentum is the community and curriculum that delivers those findings as executable systems. Labs is the evidence; Momentum is the execution."
        }
      },
      {
        "@type": "Question",
        "name": "Can I cancel my Beacon Momentum membership?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. Memberships are annual and can be cancelled before renewal. We do not offer prorated refunds on annual memberships, but we do not lock you into multi-year contracts. You retain access through the end of your paid period."
        }
      },
      {
        "@type": "Question",
        "name": "What is the Watch Brief?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The Watch Brief is Beacon Momentum's weekly intelligence report covering AI tools, digital marketing shifts, business systems, and market signals. The premium edition is included with every membership tier. A free public edition is available at beaconmomentum.com."
        }
      },
      {
        "@type": "Question",
        "name": "How does Beacon Momentum help with AI and business automation?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Beacon Momentum teaches members to build private AI systems they own and control. Through the Beacon Systems pathway and Beacon Labs research, members learn to automate client workflows, build AI-powered content pipelines, and deploy sovereign systems that reduce dependence on expensive SaaS subscriptions."
        }
      }
    ]
  }
